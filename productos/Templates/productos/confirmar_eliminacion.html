{% extends 'productos/base.html' %}

{% block title %}Eliminar producto{% endblock %}

{% block content %}

<h2>¿Eliminar producto?</h2>

<p>Estás a punto de eliminar <strong>{{ producto.nombre }}</strong>.</p>

<form method="post">
    {% csrf_token %}
    <button type="submit">Sí, eliminar</button>
</form>

<a href="{% url 'lista_productos' %}">Cancelar</a>

{% endblock %}
